<!doctype html><html lang='ar' dir='rtl'><meta charset='utf-8'><link rel='stylesheet' href='../assets/css/game.css'><body><h2>لعبة الحروف V2</h2><div id=q></div><div id=c></div><script src='../assets/js/game-engine.js'></script><script>
let i=0,arr=[];loadQuestions().then(a=>{arr=a;show()});
function show(){let x=arr[i];q.textContent='ما أول حرف في كلمة '+x.emoji+' '+x.word+'؟';c.innerHTML='';x.choices.sort(()=>Math.random()-0.5).forEach(v=>{let b=document.createElement('button');b.textContent=v;b.onclick=()=>{if(v===x.answer){alert('أحسنت');i=(i+1)%arr.length;show()}else alert('حاول مرة أخرى')};c.appendChild(b);});}
</script></body></html>
